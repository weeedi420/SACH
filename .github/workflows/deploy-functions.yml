name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Verify CLI installed
        run: supabase --version

      - name: Deploy scrape-news
        run: supabase functions deploy scrape-news --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt

      - name: Deploy backfill-news
        run: supabase functions deploy backfill-news --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt

      - name: Deploy news-chat
        run: supabase functions deploy news-chat --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy extract-claims
        run: supabase functions deploy extract-claims --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy self-heal
        run: supabase functions deploy self-heal --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
