name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy scrape-news    --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --no-verify-jwt
          supabase functions deploy backfill-news  --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --no-verify-jwt
          supabase functions deploy news-chat      --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          supabase functions deploy extract-claims --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          supabase functions deploy self-heal      --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          supabase functions deploy send-digest    --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --no-verify-jwt
          echo "All functions deployed successfully"
